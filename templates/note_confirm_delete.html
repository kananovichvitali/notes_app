<h2>Видалення нотатки</h2>
<form method="post">
    {% csrf_token %}
    <p>Ви впевнені, що хочете видалити нотатку "{{ object.title }}"?</p>
    <button type="submit" style="background: red; color: white; padding: 10px;">Так, видалити назавжди</button>
</form>
<br>
<a href="{% url 'note_detail' object.pk %}">Ні, повернутися назад</a>
