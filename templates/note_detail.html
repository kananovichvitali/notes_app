{% extends 'base.html' %}

{% block content %}
<div class="card mx-auto" style="max-width: 800px;">
    <div class="card-body">
        <span class="badge bg-info text-dark mb-2">{{ note.category.title }}</span>
        <h1 class="card-title">{{ note.title }}</h1>
        <p class="lead mt-4">{{ note.text }}</p>
        <hr>
        <p class="text-muted">Нагадування: {{ note.reminder|default:"Немає" }}</p>

        <div class="mt-4">
            <a href="{% url 'note_edit' note.pk %}" class="btn btn-warning">Редагувати</a>
            <a href="{% url 'note_delete' note.pk %}" class="btn btn-danger">Видалити</a>
            <a href="{% url 'note_list' %}" class="btn btn-light border">Назад</a>
        </div>
    </div>
</div>
{% endblock %}
